<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pg3</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="icon" href="favicon.png" />
  <!-- Preload critical assets before JS runs -->
  <link rel="preload" href="assets/player_01_front.png" as="image">
  <link rel="preload" href="assets/player_01_back.png" as="image">
  <link rel="preload" href="assets/player_02_front.png" as="image">
  <link rel="preload" href="assets/player_02_back.png" as="image">
  <link rel="preload" href="assets/emote_01.png" as="image">
  <link rel="preload" href="assets/emote_02.png" as="image">
  <style>
    *, *::before, *::after {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none;
      background: #fff;
    }
    canvas {
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>

  <div id="pg-loading" style="
    position:fixed;inset:0;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    z-index:9999;
    transition:opacity .3s;
  ">
    <span id="pg-loading-text" style="font:14px/1 sans-serif;color:#000;">loading...</span>
  </div>

  <!-- p5.js v2 -->
  <script src="https://cdn.jsdelivr.net/npm/p5@2/lib/p5.min.js"></script>

  <!-- ECS core -->
  <script src="ecs.js"></script>

  <!-- Collision math -->
  <script src="utils/collision.js"></script>

  <!-- UI + Emotes (before systems so uiState is available to CameraSystem) -->
  <script src="systems/UISystem.js"></script>
  <script src="systems/EmoteSystem.js"></script>

  <!-- Systems -->
  <script src="systems/TouchInputSystem.js"></script>
  <script src="systems/TouchJoystickRenderSystem.js"></script>
  <script src="systems/InputSystem.js"></script>
  <script src="systems/PlayerMotionSystem.js"></script>
  <script src="systems/GravitySystem.js"></script>
  <script src="systems/IntegrateSystem.js"></script>
  <script src="systems/CollisionSystem.js"></script>
  <script src="systems/RespawnSystem.js"></script>
  <script src="systems/AnimationSystem.js"></script>
  <script src="systems/CameraSystem.js"></script>
  <script src="systems/RenderSystem.js"></script>
  <script src="systems/NetworkSystem.js"></script>

  <!-- Entry point -->
  <script src="main.js"></script>
</body>
</html>
